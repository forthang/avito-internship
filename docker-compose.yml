services:
  server:
    build: ./Frontend-trainee-assignment-spring-2026/server
    ports:
      - '8080:8080'
    environment:
      - port=8080
    restart: unless-stopped

  client:
    build:
      context: ./Frontend-trainee-assignment-spring-2026/client
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - server
    restart: unless-stopped
    profiles:
      - prod

  client-dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - ./Frontend-trainee-assignment-spring-2026/client:/app
      - client_node_modules:/app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - API_PROXY_TARGET=http://server:8080
    command: sh -c "npm install && npm start"
    depends_on:
      - server
    restart: unless-stopped
    profiles:
      - dev

volumes:
  client_node_modules:
